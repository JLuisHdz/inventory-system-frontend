<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6">

  <div class="w-full max-w-xl bg-white rounded-2xl shadow-lg p-8">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-gray-800 mb-6">
      {{ isEditMode ? 'Edit User' : 'Create User' }}
    </h2>

    <form (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- Username -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">Username</label>
        <input
          type="text"
          [(ngModel)]="user.username"
          name="username"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Name -->
      <div>
        <label class="block text-sm text-gray-600 mb-1">Name</label>
        <input
          type="text"
          [(ngModel)]="user.nombre"
          name="nombre"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Password -->
      <div *ngIf="!isEditMode">
        <label class="block text-sm text-gray-600 mb-1">Password</label>
        <input
          type="password"
          [(ngModel)]="user.password"
          name="password"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Roles -->
      <div>
        <label class="block text-sm text-gray-600 mb-2">Roles</label>

        <div class="grid grid-cols-2 gap-3">

          <label
            *ngFor="let role of rolesList"
            class="flex items-center gap-2 border border-gray-300 p-3 rounded-lg cursor-pointer hover:bg-gray-100 transition"
          >
            <input
              type="checkbox"
              [value]="role"
              [checked]="selectedRoles.includes(role)"
              (change)="onRoleChange(role, $event)"
              class="accent-blue-600"
            />
            <span class="text-gray-700 text-sm">{{ role }}</span>
          </label>

        </div>
      </div>

      <!-- Button -->
      <button
        type="submit"
        [disabled]="isSubmitting"
        class="w-full bg-blue-600 hover:bg-blue-700 transition text-white py-2 rounded-lg font-semibold disabled:opacity-50"
      >
        {{ isSubmitting 
            ? 'Saving...' 
            : (isEditMode ? 'Update User' : 'Create User') }}
      </button>

    </form>

  </div>

</div>
