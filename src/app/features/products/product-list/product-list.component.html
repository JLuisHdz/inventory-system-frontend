<h2>Products</h2>

<div *ngIf="isLoading">
  Loading products...
</div>

<table border="1" *ngIf="!isLoading">

  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Description</th>
      <th>Price</th>
      <th>Stock</th>
      <th>Created</th>
    </tr>
  </thead>

  <button routerLink="/products/create">
  Create Product
  </button>
  <tbody>
    <tr *ngFor="let product of products" >
      <td>{{ product.id }}</td>
      <td>{{ product.name }}</td>
      <td>{{ product.description }}</td>
      <td>{{ product.price }}</td>
      <td>{{ product.stock }}</td>
      <td>{{ product.creationDate }}</td>
      <td>
        <button [routerLink]="['/products/edit', product.id]">
          Edit
        </button>
      </td>
      <td>
        <button (click)="deleteProduct(product.id)"
        [disabled]="isLoading">
      Delete
      </button>
      </td>
    </tr>
  </tbody>

  <div style="margin-top: 20px;" class="pagination">

  <button (click)="previousPage()" 
        [disabled]="currentPage === 0 || isLoading">Previous</button>

  <span>
    Page {{ currentPage + 1 }} of {{ totalPages }}
  </span>

  <button (click)="nextPage()" 
        [disabled]="currentPage >= totalPages - 1 || isLoading">Next</button>

  </div>

</table>
