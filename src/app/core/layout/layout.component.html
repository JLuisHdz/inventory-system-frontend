<div class="flex h-screen">

  <aside class="w-64 bg-gray-900 text-white flex flex-col">

    <div class="p-4 text-xl font-bold border-b border-gray-700">
      Inventory System
    </div>

    <nav class="flex-1 p-4 space-y-2">

      <a routerLink="/dashboard" routerLinkActive="bg-gray-700"
        class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">
        <lucide-icon [img]="DashboardIcon" class="w-5 h-5"></lucide-icon>
        Dashboard
      </a>

      <a routerLink="/products" routerLinkActive="bg-gray-700"
        class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">
        <lucide-icon [img]="ProductsIcon" class="w-5 h-5"></lucide-icon>
        Products
      </a>

      <a *ngIf="isAdmin" routerLink="/users" routerLinkActive="bg-gray-700"
      class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">
      <lucide-icon [img]="ProductsIcon" class="w-5 h-5"></lucide-icon>Users</a>

    </nav>

  </aside>

  <div class="flex-1 flex flex-col">

    <header class="bg-white shadow px-6 py-4 flex justify-end items-center gap-4">

      <span class="text-gray-700 font-medium">
        {{ username }}
      </span>

      <button (click)="logout()" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">
        Logout
      </button>

    </header>

    <main class="flex-1 p-6 bg-gray-100 overflow-auto" [@routeAnimation]="prepareRoute(outlet)">

      <router-outlet #outlet="outlet"></router-outlet>

    </main>

  </div>

</div>
